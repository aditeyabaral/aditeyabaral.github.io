    Experience:
      - position: Applied Research Scientist Intern
        name: "Redis, LangCache"
        location: San Francisco, USA
        start_date: "Jun '25"
        end_date: "Dec '25"
        summary: "Advisor: Srijith Rajamohan"
        highlights:
          - "Introduced **Precision–Cache Hit Ratio (P-CHR)** and **Calibration Retention Rate (CRR)**, two cache-aware metrics for [Redis LangCache](https://redis.io/langcache/), reframing semantic-cache model selection as a calibration problem rather than a ranking one."
          - "Curated and open-sourced [LangCache SentencePairs (v1-v3)](https://huggingface.co/collections/redis/langcache-datasets), a large-scale dataset family with 1M to 40M sentence pairs across diverse paraphrase, STS, QA, and adversarial sources for robust semantic-caching fine-tuning."
          - "Fine-tuned and deployed [LangCache-Embed-v3](https://huggingface.co/redis/langcache-embed-v3-small), a domain-specific bi-encoder trained with an ArcFace contrastive objective, leading all open-source retrievers offline and outperforming larger general-purpose models even without re-ranking."
          - "Open-sourced the [LangCache ReRanker v1](https://huggingface.co/collections/redis/langcache-re-ranker-v1)/[v2](https://huggingface.co/collections/redis/langcache-re-ranker-v2) cross-encoder families with BCE and MNRL objectives at two training scales, isolating the effect of objective vs. scale on calibration and enabling application-specific behavior."
          - "Built a comprehensive evaluation framework for customer onboarding with a large-scale study of customer data and model baselines across offline and deployment settings, using a two-stage [RedisVL](https://docs.redisvl.com/en/latest/) K-NN retrieval and re-ranking pipeline."
          - Demonstrated that the highest-PR-AUC models are often the worst in deployment, and that re-ranking rarely improves a strong domain retriever, overturning the standard practice in semantic-cache model selection.
          - "Supported downstream integration and development of [LMCache](https://lmcache.ai/) by building prototypes and benchmarking performance with Redis as an in-memory KV store, demonstrating latency and throughput gains."

      - position: Research Assistant
        name: Computational Intelligence, Vision, and Robotics (CILVR) Lab, NYU
        location: New York City, USA
        start_date: "May '25"
        end_date: "May '26"
        summary: "Advisors: Shauli Ravfogel, Tal Linzen"
        highlights:
          - Investigated arithmetic circuit dynamics in language models when operators are redefined in-context by analyzing activation representations and attention patterns across transformer layers.
          - Trained tiny (~3M params) LLaMA-style transformers on arithmetic operations under operator overloading to test whether transformers reuse circuits across semantically related tasks.
          - Developed an activation-extraction and causal-attribution pipeline pairing neuron selection with Activation Patching, Direct Logit Attribution, and Fourier probes to separate causally necessary components from merely predictive ones.
          - Identified and characterized a two-tier circuit structure across a model's depth and breadth, showing transformers organize computation around semantic operations rather than surface symbols.

      - position: Research Assistant
        name: Computation and Psycholinguistics Lab, NYU
        location: New York City, USA
        start_date: "May '25"
        end_date: "Aug '25"
        summary: "Advisors: Jackson Petty, Tal Linzen"
        highlights:
          - Evaluated LLMs on compositional generalization and instruction synthesis by studying their ability to translate synthetic Context-Free Grammars (CFGs) into conforming strings.
          - Analyzed model outputs in few- and zero-shot settings to assess grammatical conformity and uncover generation strategies used during translation.

